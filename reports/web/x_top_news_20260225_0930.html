<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Top 新聞 - 2026-02-25</title>
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #16181c;
            --bg-card: #1e2028;
            --text-primary: #e7e9ea;
            --text-secondary: #71767b;
            --accent: #1d9bf0;
            --border: #2f3336;
            --love: #f91880;
            --retweet: #00ba7c;
            --reply: #1d9bf0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            margin: -20px -20px 20px -20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .meta { color: var(--text-secondary); font-size: 0.875rem; }
        .blocked-banner {
            background: #ff4444;
            color: white;
            padding: 12px 20px;
            margin: 0 -20px 20px -20px;
            font-weight: bold;
            text-align: center;
        }
        .category {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .category-header {
            background: var(--bg-card);
            padding: 12px 16px;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .category-header:hover { background: #252830; }
        .tweet-count {
            background: var(--accent);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.875rem;
        }
        .tweet {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .tweet:hover { background: rgba(255,255,255,0.03); }
        .tweet:last-child { border-bottom: none; }
        .tweet-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .author {
            font-weight: bold;
            color: var(--text-primary);
            text-decoration: none;
        }
        .author:hover { text-decoration: underline; }
        .time { color: var(--text-secondary); font-size: 0.875rem; }
        .tweet-text {
            margin-bottom: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .tweet-text:hover { background: rgba(29, 155, 240, 0.1); }
        .tweet-text.copied { background: rgba(0, 186, 124, 0.2); }
        .tweet-actions {
            display: flex;
            gap: 20px;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        .action {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .action.love { color: var(--love); }
        .action.retweet { color: var(--retweet); }
        .action.reply { color: var(--reply); }
        .tweet-id {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 8px;
            cursor: pointer;
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .tweet-id:hover { background: rgba(29, 155, 240, 0.2); color: var(--accent); }
        .tweet-id.copied { background: rgba(0, 186, 124, 0.3); color: var(--retweet); }
        .empty { padding: 40px; text-align: center; color: var(--text-secondary); }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @media (max-width: 600px) {
            .container { padding: 10px; }
            header { margin: -10px -10px 10px -10px; padding: 15px; }
            h1 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐦 X Top 新聞</h1>
            <div class="meta">產生時間：2026-02-25 09:30 (台北時間)｜共 0 則新推文</div>
        </header>
        

    </div>
    <div class="toast" id="toast">已複製！</div>
    <script>
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function copyText(el, url) {
            const text = el.textContent + '\n' + url;
            navigator.clipboard.writeText(text).then(() => {
                el.classList.add('copied');
                setTimeout(() => el.classList.remove('copied'), 500);
                showToast('已複製推文文字+連結');
            });
        }
        
        function copyId(el, id) {
            const text = 'https://x.com/i/status/' + id;
            navigator.clipboard.writeText(text).then(() => {
                el.classList.add('copied');
                setTimeout(() => el.classList.remove('copied'), 500);
                showToast('已複製推文連結');
            });
        }
        
        function toggleCategory(header) {
            const category = header.parentElement;
            const tweets = category.querySelectorAll('.tweet');
            tweets.forEach(t => t.style.display = t.style.display === 'none' ? 'block' : 'none');
        }
    </script>
</body>
</html>
