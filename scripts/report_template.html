<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Daily Report - {{DATE}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .date {
            color: var(--text-muted);
            margin-top: 10px;
        }
        .section-title {
            font-size: 1.5rem;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            margin: 40px 0 20px;
        }
        .report-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
            transition: transform 0.2s;
        }
        .report-card:hover {
            transform: translateY(-5px);
        }
        .card-meta {
            font-size: 0.875rem;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 600;
        }
        .summary {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        .source-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.875rem;
        }
        .source-link:hover {
            text-decoration: underline;
        }
        .footer {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        .tag {
            background: #0ea5e9;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sentinel Daily Intelligence</h1>
            <p class="date">{{DATE}} | 虛擬編輯部 彙整</p>
        </header>

        <div class="section-title">🚀 科技與 AI 趨勢重點</div>
        {{CONTENT}}

        <div class="footer">
            Generated by OpenClaw Agent Teams | G大專屬情報系統
        </div>
    </div>
</body>
</html>
