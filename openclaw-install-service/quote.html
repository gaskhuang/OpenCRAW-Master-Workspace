<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw 安裝服務｜需求與報價單</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#0f172a;margin:0}
    .wrap{max-width:900px;margin:0 auto;padding:32px 20px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px}
    h1{font-size:40px} label{display:block;font-weight:700;margin:14px 0 6px}
    input,textarea,select{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:10px;font-size:16px}
    textarea{min-height:120px} .hint{color:#475569;font-size:14px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>OpenClaw 安裝服務需求單</h1>
    <p class="hint">這頁先做成可直接複製的報價表單。之後可以再接 Google Form / Tally / Notion。</p>
    <label>姓名 / 公司</label><input>
    <label>聯絡方式</label><input>
    <label>你目前最想自動化的 3 件事</label><textarea></textarea>
    <label>目前主要使用的平台</label><input placeholder="Telegram / LINE / Gmail / FB / X / Google Drive...">
    <label>你比較需要哪一類</label>
    <select><option>提醒型</option><option>監控型</option><option>報告型</option><option>執行型</option><option>還不確定</option></select>
    <label>是否已有主機 / Mac mini</label><select><option>有</option><option>沒有，需要建議</option></select>
    <label>希望預算</label><select><option>6,800 內</option><option>12,800 左右</option><option>25,800 以上</option><option>先聊需求</option></select>
    <label>備註</label><textarea></textarea>
  </div>
</div>
</body>
</html>
